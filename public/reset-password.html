<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NAS Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="/css/reset-password.css">
</head>
<body>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <!-- Language Selector -->
    <div class="lang-switcher">
        <button class="lang-btn" onclick="toggleLangMenu(event)">
            <span id="currentLangIcon">🇻🇳</span> <span id="currentLangText">VI</span>
            <span class="material-icons-round" style="font-size:16px">arrow_drop_down</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option" onclick="setLanguage('vi')">🇻🇳 Tiếng Việt</div>
            <div class="lang-option" onclick="setLanguage('en')">🇬🇧 English</div>
        </div>
    </div>

    <!-- Container -->
    <div class="reset-container">
        <div class="logo-section">
            <div class="logo-icon">
                <span class="material-icons-round">vpn_key</span>
            </div>
            <div>
                <h1 data-i18n="resetTitle">Khôi phục mật khẩu</h1>
                <p id="resetSub" data-i18n="resetDesc">Nhập mật khẩu mới cho tài khoản của bạn</p>
            </div>
        </div>

        <div class="alert" id="errorAlert">
            <span class="material-icons-round" style="font-size:18px">error_outline</span>
            <span id="errorText">Lỗi liên kết khôi phục.</span>
        </div>

        <div id="loadingBox" class="loading">
            <span class="material-icons-round" style="animation: spin 1s linear infinite">sync</span>
            <span data-i18n="validating">Đang xác thực liên kết...</span>
        </div>

        <!-- Form reset password -->
        <form id="resetForm" onsubmit="handleReset(event)" style="display:none">
            <div class="form-group" style="margin-bottom: 12px;">
                <label data-i18n="userLabel">Tài khoản</label>
                <div style="font-weight:600; padding: 10px 0; color: var(--accent)" id="usernameText">--</div>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="newPassLabel">Mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" id="password" required minlength="6">
                    <span class="material-icons-round">lock</span>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                        <span class="material-icons-round">visibility</span>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword" data-i18n="confirmPassLabel">Xác nhận mật khẩu mới</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" required minlength="6">
                    <span class="material-icons-round">lock_reset</span>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('confirmPassword', this)">
                        <span class="material-icons-round">visibility</span>
                    </button>
                </div>
            </div>
            <button type="submit" class="submit-btn">
                <span data-i18n="changePassBtn">Đổi mật khẩu</span>
                <span class="material-icons-round">check_circle</span>
            </button>
        </form>

        <!-- Success view -->
        <div id="successBox" class="success-box">
            <span class="material-icons-round success-icon">check_circle</span>
            <p style="font-weight:500;" data-i18n="resetSuccess">Đặt lại mật khẩu thành công!</p>
            <button class="submit-btn" onclick="window.location.href='/login'" style="max-width: 200px;">
                <span data-i18n="loginBtn">Đăng nhập</span>
                <span class="material-icons-round">login</span>
            </button>
        </div >
    </div>

    <script src="/js/reset-password.js"></script>
</body>
</html>
