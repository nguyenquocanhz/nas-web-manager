<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Server Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <!-- Language Selector -->
    <div class="lang-switcher">
        <button class="lang-btn" onclick="toggleLangMenu(event)">
            <span id="currentLangIcon">🇻🇳</span> <span id="currentLangText">VI</span>
            <span class="material-icons-round" style="font-size:16px">arrow_drop_down</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
            <div class="lang-option" onclick="setLanguage('vi')">🇻🇳 Tiếng Việt</div>
            <div class="lang-option" onclick="setLanguage('en')">🇬🇧 English</div>
        </div>
    </div>

    <!-- Login Box -->
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <span class="material-icons-round">dns</span>
            </div>
            <div>
                <h1 data-i18n="loginTitle">Đăng nhập máy chủ NAS</h1>
                <p data-i18n="loginDesc">Vui lòng nhập tài khoản để truy cập hệ thống</p>
            </div>
        </div>

        <div class="alert" id="errorAlert">
            <span class="material-icons-round" style="font-size:18px">error_outline</span>
            <span id="errorText">Tên đăng nhập hoặc mật khẩu sai.</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username" data-i18n="usernameLabel">Tên đăng nhập</label>
                <div class="input-wrapper">
                    <input type="text" id="username" autocomplete="username" required>
                    <span class="material-icons-round">person</span>
                </div>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="passwordLabel">Mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" id="password" autocomplete="current-password" required>
                    <span class="material-icons-round">lock</span>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)">
                        <span class="material-icons-round">visibility</span>
                    </button>
                </div>
            </div>
            <div style="display:flex; justify-content:flex-end; margin-bottom: 20px; margin-top:-10px;">
                <a href="#" onclick="showForgotPassword(event)" style="font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500;" data-i18n="forgotPasswordLink">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="login-btn">
                <span data-i18n="loginBtn">Đăng nhập</span>
                <span class="material-icons-round">login</span>
            </button>
        </form>

        <!-- Forgot Password Box (hidden by default) -->
        <form id="forgotForm" onsubmit="handleForgotPassword(event)" style="display:none">
            <div class="form-group">
                <label for="email" data-i18n="emailLabel">Địa chỉ Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" required>
                    <span class="material-icons-round">email</span>
                </div>
            </div>
            <button type="submit" class="login-btn">
                <span data-i18n="sendResetBtn">Gửi yêu cầu</span>
                <span class="material-icons-round">send</span>
            </button>
            <div style="margin-top: 20px;">
                <a href="#" onclick="showLoginForm(event)" style="font-size: 13px; color: var(--text-secondary); text-decoration: none;" data-i18n="backToLogin">Quay lại Đăng nhập</a>
            </div>
        </form>

        <!-- OTP Verification Box (hidden by default) -->
        <form id="otpForm" onsubmit="handleOTP(event)" style="display:none">
            <div class="form-group">
                <label for="otp" data-i18n="otpLabel">Mã xác thực OTP</label>
                <div class="input-wrapper">
                    <input type="text" id="otp" required maxlength="6" pattern="\d{6}" placeholder="------" style="text-align:center; letter-spacing: 6px; font-size: 20px; font-weight: 700;">
                    <span class="material-icons-round">security</span>
                </div>
            </div>
            <button type="submit" class="login-btn">
                <span data-i18n="otpBtn">Xác minh</span>
                <span class="material-icons-round">verified_user</span>
            </button>
            <div style="margin-top: 20px;">
                <a href="#" onclick="showLoginForm(event)" style="font-size: 13px; color: var(--text-secondary); text-decoration: none;" data-i18n="backToLogin">Quay lại Đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
